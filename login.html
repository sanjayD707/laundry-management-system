    <!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LaundryPro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">

```
<form class="auth-form" id="loginForm">

    <h2>Login</h2>

    <input
        type="email"
        id="email"
        placeholder="Email Address"
        required
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
        required
    >

    <button type="submit">
        Login
    </button>

    <p>
        Don't have an account?
        <a href="register.html">
            Register
        </a>
    </p>

    <div id="message"></div>

</form>
```

</div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    try{

        const response =
        await fetch(
        "http://localhost:5000/api/auth/login",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                email:
                document.getElementById("email").value,

                password:
                document.getElementById("password").value

            })

        });

        const result =
        await response.json();

        if(response.ok){

            localStorage.setItem(
            "token",
            result.token
            );

            localStorage.setItem(
            "userId",
            result.user.id
            );

            localStorage.setItem(
            "userName",
            result.user.name
            );

            document
            .getElementById("message")
            .innerHTML =
            "Login Successful 🎉";

            setTimeout(()=>{

                window.location.href =
                "book-now.html";

            },1000);

        }else{

            document
            .getElementById("message")
            .innerHTML =
            result.message;

        }

    }catch(error){

        console.log(error);

        document
        .getElementById("message")
        .innerHTML =
        "Server Connection Error";

    }

});

</script>

</body>
</html>


</div>

</body>
